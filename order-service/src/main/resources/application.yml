spring:
  application:
    name: order-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/minimall_order?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:minimall}
    password: ${SPRING_DATASOURCE_PASSWORD:change-me}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:none}
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:127.0.0.1}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:minimall}
    password: ${SPRING_RABBITMQ_PASSWORD:change-me}
    virtual-host: ${SPRING_RABBITMQ_VIRTUAL_HOST:/}
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:127.0.0.1}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      repositories:
        enabled: false

server:
  port: 8104

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

minimall:
  order:
    payment-expire-seconds: ${ORDER_PAYMENT_EXPIRE_SECONDS:900}
    timeout:
      enabled: ${MINIMALL_ORDER_TIMEOUT_ENABLED:true}
      fixed-delay: ${MINIMALL_ORDER_TIMEOUT_FIXED_DELAY:60000}
      batch-size: ${MINIMALL_ORDER_TIMEOUT_BATCH_SIZE:100}
    idempotency:
      lock-ttl-seconds: ${ORDER_IDEMPOTENCY_LOCK_TTL_SECONDS:30}
  clients:
    product-service:
      base-url: ${PRODUCT_SERVICE_BASE_URL:http://127.0.0.1:8102}
    inventory-service:
      base-url: ${INVENTORY_SERVICE_BASE_URL:http://127.0.0.1:8103}
