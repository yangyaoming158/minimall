spring:
  application:
    name: user-service
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

minimall:
  auth:
    jwt:
      secret: ${MINIMALL_AUTH_JWT_SECRET}
      expire-seconds: ${MINIMALL_AUTH_JWT_EXPIRE_SECONDS:3600}
  admin:
    seed:
      enabled: ${MINIMALL_ADMIN_SEED_ENABLED:false}
      username: ${MINIMALL_ADMIN_SEED_USERNAME:}
      password: ${MINIMALL_ADMIN_SEED_PASSWORD:}
      email: ${MINIMALL_ADMIN_SEED_EMAIL:}
      phone: ${MINIMALL_ADMIN_SEED_PHONE:}

server:
  port: 8101

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  prometheus:
    metrics:
      export:
        enabled: ${MANAGEMENT_PROMETHEUS_METRICS_EXPORT_ENABLED:true}
