global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: minimall-services
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - api-gateway:8080
        labels:
          system: minimall-order
          service: api-gateway
      - targets:
          - user-service:8101
        labels:
          system: minimall-order
          service: user-service
      - targets:
          - product-service:8102
        labels:
          system: minimall-order
          service: product-service
      - targets:
          - inventory-service:8103
        labels:
          system: minimall-order
          service: inventory-service
      - targets:
          - order-service:8104
        labels:
          system: minimall-order
          service: order-service
      - targets:
          - payment-service:8105
        labels:
          system: minimall-order
          service: payment-service
      - targets:
          - notification-service:8106
        labels:
          system: minimall-order
          service: notification-service
