spring:
  application:
    name: api-gateway
  autoconfigure:
    exclude:
      - com.minimall.common.auth.config.CommonAuthAutoConfiguration
  cloud:
    discovery:
      enabled: false
    gateway:
      routes:
        - id: user-service
          uri: ${USER_SERVICE_BASE_URL:http://localhost:8101}
          predicates:
            - Path=/api/users/**,/api/admin/login,/api/admin/me,/api/admin/audit-logs/**
        - id: product-service
          uri: ${PRODUCT_SERVICE_BASE_URL:http://localhost:8102}
          predicates:
            - Path=/api/products/**,/api/admin/products/**
        - id: inventory-service
          uri: ${INVENTORY_SERVICE_BASE_URL:http://localhost:8103}
          predicates:
            - Path=/api/inventories/**,/api/admin/inventories/**,/api/admin/operation-stats/inventory-trends
        - id: order-service
          uri: ${ORDER_SERVICE_BASE_URL:http://localhost:8104}
          predicates:
            - Path=/api/orders/**,/api/admin/orders/**,/api/admin/operation-stats/sales-by-product
        - id: payment-service
          uri: ${PAYMENT_SERVICE_BASE_URL:http://localhost:8105}
          predicates:
            - Path=/api/payments/**,/api/admin/payments/**
        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_BASE_URL:http://localhost:8106}
          predicates:
            - Path=/api/admin/notifications/**

minimall:
  auth:
    jwt:
      secret: ${MINIMALL_AUTH_JWT_SECRET}
      expire-seconds: ${MINIMALL_AUTH_JWT_EXPIRE_SECONDS:3600}
  gateway:
    cors:
      allowed-origin-patterns: ${MINIMALL_GATEWAY_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}
      allowed-methods: ${MINIMALL_GATEWAY_CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
      allowed-headers: ${MINIMALL_GATEWAY_CORS_ALLOWED_HEADERS:*}
      allow-credentials: ${MINIMALL_GATEWAY_CORS_ALLOW_CREDENTIALS:false}
      max-age: ${MINIMALL_GATEWAY_CORS_MAX_AGE:1800}
    rate-limit:
      enabled: ${MINIMALL_GATEWAY_RATE_LIMIT_ENABLED:true}
      replenish-rate: ${MINIMALL_GATEWAY_RATE_LIMIT_REPLENISH_RATE:10}
      burst-capacity: ${MINIMALL_GATEWAY_RATE_LIMIT_BURST_CAPACITY:20}
      requested-tokens: ${MINIMALL_GATEWAY_RATE_LIMIT_REQUESTED_TOKENS:1}
      key-prefix: ${MINIMALL_GATEWAY_RATE_LIMIT_KEY_PREFIX:minimall:gateway:rate-limit}
      fail-open: ${MINIMALL_GATEWAY_RATE_LIMIT_FAIL_OPEN:true}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  prometheus:
    metrics:
      export:
        enabled: ${MANAGEMENT_PROMETHEUS_METRICS_EXPORT_ENABLED:true}
