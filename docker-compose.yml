x-java-service-build: &java-service-build
  context: .
  dockerfile: infra/docker/java-service.Dockerfile

x-java-service-environment: &java-service-environment
  TZ: ${TZ:-Asia/Shanghai}
  JAVA_OPTS: ${JAVA_OPTS:-}
  SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/${MYSQL_DATABASE:?MYSQL_DATABASE is required}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false"
  SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:?MYSQL_USER is required}
  SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
  SPRING_DATA_REDIS_HOST: redis
  SPRING_DATA_REDIS_PORT: 6379
  SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
  SPRING_RABBITMQ_HOST: rabbitmq
  SPRING_RABBITMQ_PORT: 5672
  SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:?RABBITMQ_DEFAULT_USER is required}
  SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:?RABBITMQ_DEFAULT_PASS is required}
  SPRING_RABBITMQ_VIRTUAL_HOST: /
  MINIMALL_AUTH_JWT_SECRET: ${MINIMALL_AUTH_JWT_SECRET:?MINIMALL_AUTH_JWT_SECRET is required}
  MINIMALL_AUTH_JWT_EXPIRE_SECONDS: ${MINIMALL_AUTH_JWT_EXPIRE_SECONDS:-3600}
  MINIMALL_AUTH_INTERNAL_SECRET: ${MINIMALL_INTERNAL_TOKEN:?MINIMALL_INTERNAL_TOKEN is required}
  MANAGEMENT_PROMETHEUS_METRICS_EXPORT_ENABLED: ${MANAGEMENT_PROMETHEUS_METRICS_EXPORT_ENABLED:-true}

x-java-service-healthcheck: &java-service-healthcheck
  test: ["CMD-SHELL", "wget -q --spider \"http://127.0.0.1:$${SERVER_PORT}/actuator/health\" || exit 1"]
  interval: 15s
  timeout: 5s
  retries: 20
  start_period: 45s

services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:?MYSQL_DATABASE is required}
      MYSQL_USER: ${MYSQL_USER:?MYSQL_USER is required}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
      - ./infra/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$${MYSQL_ROOT_PASSWORD}\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - minimall-local

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: ["sh", "-c", "redis-server --appendonly yes --requirepass \"$${REDIS_PASSWORD}\""]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - minimall-local

  rabbitmq:
    image: rabbitmq:3.13-management
    restart: unless-stopped
    hostname: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:?RABBITMQ_DEFAULT_USER is required}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:?RABBITMQ_DEFAULT_PASS is required}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${RABBITMQ_AMQP_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - minimall-local

  prometheus:
    image: ${PROMETHEUS_IMAGE:-prom/prometheus:v2.55.1}
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
      - --web.enable-lifecycle
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    healthcheck:
      test: ["CMD", "promtool", "check", "config", "/etc/prometheus/prometheus.yml"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - minimall-local

  grafana:
    image: ${GRAFANA_IMAGE:-grafana/grafana-oss:11.3.1}
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:?GRAFANA_ADMIN_USER is required}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
      GF_USERS_ALLOW_SIGN_UP: ${GRAFANA_USERS_ALLOW_SIGN_UP:-false}
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/minimall-observability.json
      GRAFANA_PROMETHEUS_URL: ${GRAFANA_PROMETHEUS_URL:-http://prometheus:9090}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - minimall-local

  user-service:
    image: ${MINIMALL_IMAGE_PREFIX:-minimall}/user-service:${MINIMALL_IMAGE_TAG:-local}
    profiles:
      - services
    build:
      <<: *java-service-build
      args:
        JAVA_RUNTIME_IMAGE: ${JAVA_RUNTIME_IMAGE:-eclipse-temurin:17-jre-alpine}
        JAR_FILE: user-service/target/user-service-0.0.1-SNAPSHOT.jar
    restart: unless-stopped
    environment:
      <<: *java-service-environment
      SERVER_PORT: 8101
    # Not published: downstream services are reachable only inside the compose
    # network (via the gateway). Exposing the port would let a client bypass the
    # gateway and forge trusted headers / hit /internal directly.
    expose:
      - "8101"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck: *java-service-healthcheck
    networks:
      - minimall-local

  product-service:
    image: ${MINIMALL_IMAGE_PREFIX:-minimall}/product-service:${MINIMALL_IMAGE_TAG:-local}
    profiles:
      - services
    build:
      <<: *java-service-build
      args:
        JAVA_RUNTIME_IMAGE: ${JAVA_RUNTIME_IMAGE:-eclipse-temurin:17-jre-alpine}
        JAR_FILE: product-service/target/product-service-0.0.1-SNAPSHOT.jar
    restart: unless-stopped
    environment:
      <<: *java-service-environment
      SERVER_PORT: 8102
      PRODUCT_DETAIL_CACHE_TTL_SECONDS: ${PRODUCT_DETAIL_CACHE_TTL_SECONDS:-300}
    # Not published — gateway-only access (see user-service note).
    expose:
      - "8102"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck: *java-service-healthcheck
    networks:
      - minimall-local

  inventory-service:
    image: ${MINIMALL_IMAGE_PREFIX:-minimall}/inventory-service:${MINIMALL_IMAGE_TAG:-local}
    profiles:
      - services
    build:
      <<: *java-service-build
      args:
        JAVA_RUNTIME_IMAGE: ${JAVA_RUNTIME_IMAGE:-eclipse-temurin:17-jre-alpine}
        JAR_FILE: inventory-service/target/inventory-service-0.0.1-SNAPSHOT.jar
    restart: unless-stopped
    environment:
      <<: *java-service-environment
      SERVER_PORT: 8103
      ORDER_SERVICE_BASE_URL: http://order-service:8104
      # AI provider passthrough — inventory-service is the only consumer, so
      # these stay out of the shared anchor (no AI_API_KEY in other services).
      # Defaults keep the no-network MOCK provider; real providers (DEEPSEEK /
      # MINIMAX) send inventory and sales snapshots to the external vendor.
      AI_PROVIDER: ${AI_PROVIDER:-MOCK}
      AI_MODEL: ${AI_MODEL:-}
      AI_BASE_URL: ${AI_BASE_URL:-}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_REQUEST_TIMEOUT_MS: ${AI_REQUEST_TIMEOUT_MS:-5000}
      AI_MODEL_STRICT_JSON: ${AI_MODEL_STRICT_JSON:-true}
      AI_MOCK_ENABLED: ${AI_MOCK_ENABLED:-true}
    # Not published — gateway-only access (see user-service note).
    expose:
      - "8103"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck: *java-service-healthcheck
    networks:
      - minimall-local

  order-service:
    image: ${MINIMALL_IMAGE_PREFIX:-minimall}/order-service:${MINIMALL_IMAGE_TAG:-local}
    profiles:
      - services
    build:
      <<: *java-service-build
      args:
        JAVA_RUNTIME_IMAGE: ${JAVA_RUNTIME_IMAGE:-eclipse-temurin:17-jre-alpine}
        JAR_FILE: order-service/target/order-service-0.0.1-SNAPSHOT.jar
    restart: unless-stopped
    environment:
      <<: *java-service-environment
      SERVER_PORT: 8104
      PRODUCT_SERVICE_BASE_URL: http://product-service:8102
      INVENTORY_SERVICE_BASE_URL: http://inventory-service:8103
      ORDER_PAYMENT_EXPIRE_SECONDS: ${ORDER_PAYMENT_EXPIRE_SECONDS:-900}
      MINIMALL_ORDER_TIMEOUT_ENABLED: ${MINIMALL_ORDER_TIMEOUT_ENABLED:-true}
      MINIMALL_ORDER_TIMEOUT_FIXED_DELAY: ${MINIMALL_ORDER_TIMEOUT_FIXED_DELAY:-60000}
      MINIMALL_ORDER_TIMEOUT_BATCH_SIZE: ${MINIMALL_ORDER_TIMEOUT_BATCH_SIZE:-100}
      ORDER_IDEMPOTENCY_LOCK_TTL_SECONDS: ${ORDER_IDEMPOTENCY_LOCK_TTL_SECONDS:-30}
    # Not published — gateway-only access (see user-service note).
    expose:
      - "8104"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      product-service:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
    healthcheck: *java-service-healthcheck
    networks:
      - minimall-local

  payment-service:
    image: ${MINIMALL_IMAGE_PREFIX:-minimall}/payment-service:${MINIMALL_IMAGE_TAG:-local}
    profiles:
      - services
    build:
      <<: *java-service-build
      args:
        JAVA_RUNTIME_IMAGE: ${JAVA_RUNTIME_IMAGE:-eclipse-temurin:17-jre-alpine}
        JAR_FILE: payment-service/target/payment-service-0.0.1-SNAPSHOT.jar
    restart: unless-stopped
    environment:
      <<: *java-service-environment
      SERVER_PORT: 8105
    # Not published — gateway-only access (see user-service note).
    expose:
      - "8105"
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck: *java-service-healthcheck
    networks:
      - minimall-local

  notification-service:
    image: ${MINIMALL_IMAGE_PREFIX:-minimall}/notification-service:${MINIMALL_IMAGE_TAG:-local}
    profiles:
      - services
    build:
      <<: *java-service-build
      args:
        JAVA_RUNTIME_IMAGE: ${JAVA_RUNTIME_IMAGE:-eclipse-temurin:17-jre-alpine}
        JAR_FILE: notification-service/target/notification-service-0.0.1-SNAPSHOT.jar
    restart: unless-stopped
    environment:
      <<: *java-service-environment
      SERVER_PORT: 8106
    # Not published — gateway-only access (see user-service note).
    expose:
      - "8106"
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck: *java-service-healthcheck
    networks:
      - minimall-local

  api-gateway:
    image: ${MINIMALL_IMAGE_PREFIX:-minimall}/api-gateway:${MINIMALL_IMAGE_TAG:-local}
    profiles:
      - services
    build:
      <<: *java-service-build
      args:
        JAVA_RUNTIME_IMAGE: ${JAVA_RUNTIME_IMAGE:-eclipse-temurin:17-jre-alpine}
        JAR_FILE: api-gateway/target/api-gateway-0.0.1-SNAPSHOT.jar
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      JAVA_OPTS: ${JAVA_OPTS:-}
      SERVER_PORT: 8080
      USER_SERVICE_BASE_URL: http://user-service:8101
      PRODUCT_SERVICE_BASE_URL: http://product-service:8102
      INVENTORY_SERVICE_BASE_URL: http://inventory-service:8103
      ORDER_SERVICE_BASE_URL: http://order-service:8104
      PAYMENT_SERVICE_BASE_URL: http://payment-service:8105
      NOTIFICATION_SERVICE_BASE_URL: http://notification-service:8106
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      MINIMALL_AUTH_JWT_SECRET: ${MINIMALL_AUTH_JWT_SECRET:?MINIMALL_AUTH_JWT_SECRET is required}
      MINIMALL_AUTH_JWT_EXPIRE_SECONDS: ${MINIMALL_AUTH_JWT_EXPIRE_SECONDS:-3600}
      MINIMALL_AUTH_INTERNAL_SECRET: ${MINIMALL_INTERNAL_TOKEN:?MINIMALL_INTERNAL_TOKEN is required}
      MANAGEMENT_PROMETHEUS_METRICS_EXPORT_ENABLED: ${MANAGEMENT_PROMETHEUS_METRICS_EXPORT_ENABLED:-true}
      MINIMALL_GATEWAY_CORS_ALLOWED_ORIGIN_PATTERNS: ${MINIMALL_GATEWAY_CORS_ALLOWED_ORIGIN_PATTERNS:-http://localhost:*,http://127.0.0.1:*}
      MINIMALL_GATEWAY_CORS_ALLOWED_METHODS: ${MINIMALL_GATEWAY_CORS_ALLOWED_METHODS:-GET,POST,PUT,PATCH,DELETE,OPTIONS}
      MINIMALL_GATEWAY_CORS_ALLOWED_HEADERS: ${MINIMALL_GATEWAY_CORS_ALLOWED_HEADERS:-*}
      MINIMALL_GATEWAY_CORS_ALLOW_CREDENTIALS: ${MINIMALL_GATEWAY_CORS_ALLOW_CREDENTIALS:-false}
      MINIMALL_GATEWAY_CORS_MAX_AGE: ${MINIMALL_GATEWAY_CORS_MAX_AGE:-1800}
      MINIMALL_GATEWAY_RATE_LIMIT_ENABLED: ${MINIMALL_GATEWAY_RATE_LIMIT_ENABLED:-true}
      MINIMALL_GATEWAY_RATE_LIMIT_REPLENISH_RATE: ${MINIMALL_GATEWAY_RATE_LIMIT_REPLENISH_RATE:-10}
      MINIMALL_GATEWAY_RATE_LIMIT_BURST_CAPACITY: ${MINIMALL_GATEWAY_RATE_LIMIT_BURST_CAPACITY:-20}
      MINIMALL_GATEWAY_RATE_LIMIT_REQUESTED_TOKENS: ${MINIMALL_GATEWAY_RATE_LIMIT_REQUESTED_TOKENS:-1}
      MINIMALL_GATEWAY_RATE_LIMIT_KEY_PREFIX: ${MINIMALL_GATEWAY_RATE_LIMIT_KEY_PREFIX:-minimall:gateway:rate-limit}
      MINIMALL_GATEWAY_RATE_LIMIT_FAIL_OPEN: ${MINIMALL_GATEWAY_RATE_LIMIT_FAIL_OPEN:-true}
      # Only enable when the gateway truly sits behind a trusted reverse proxy;
      # otherwise clients could spoof X-Forwarded-For to dodge rate limiting.
      MINIMALL_GATEWAY_RATE_LIMIT_TRUST_FORWARDED_FOR: ${MINIMALL_GATEWAY_RATE_LIMIT_TRUST_FORWARDED_FOR:-false}
    ports:
      - "${API_GATEWAY_PORT:-8080}:8080"
    depends_on:
      redis:
        condition: service_healthy
      user-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    healthcheck: *java-service-healthcheck
    networks:
      - minimall-local

networks:
  minimall-local:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
  rabbitmq-data:
  prometheus-data:
  grafana-data:
