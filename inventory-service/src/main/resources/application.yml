spring:
  application:
    name: inventory-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/minimall_order?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:minimall}
    password: ${SPRING_DATASOURCE_PASSWORD:change-me}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:none}
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

minimall:
  ai:
    provider: ${AI_PROVIDER:MOCK}
    model: ${AI_MODEL:}
    base-url: ${AI_BASE_URL:}
    api-key: ${AI_API_KEY:}
    request-timeout-ms: ${AI_REQUEST_TIMEOUT_MS:5000}
    model-strict-json: ${AI_MODEL_STRICT_JSON:true}
    mock-enabled: ${AI_MOCK_ENABLED:true}
  clients:
    order-service:
      base-url: ${ORDER_SERVICE_BASE_URL:http://127.0.0.1:8104}

server:
  port: 8103

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  prometheus:
    metrics:
      export:
        enabled: ${MANAGEMENT_PROMETHEUS_METRICS_EXPORT_ENABLED:true}
